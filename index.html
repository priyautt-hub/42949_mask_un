<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classification Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #10b981;
            --border-color: #334155;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .header {
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom, rgba(30, 41, 59, 0.5), var(--card-bg));
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(45deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p { color: var(--text-muted); font-size: 14px; }

        /* แจ้งเตือนข้อผิดพลาดกลางหน้าจอ */
        .error-box {
            display: none;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 15px 20px;
            border-radius: 12px;
            margin: 20px 30px 0 30px;
            font-size: 14px;
            line-height: 1.6;
        }

        .workspace {
            display: flex;
            flex-wrap: wrap;
            padding: 30px;
            gap: 30px;
        }

        .view-panel, .result-panel {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .webcam-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 16px;
            overflow: hidden;
            background-color: #020617;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .webcam-wrapper.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px 0px var(--primary-glow);
        }

        #webcam-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            padding: 20px;
            position: absolute;
            z-index: 10;
        }

        .scanner-timeline {
            width: 280px;
            height: 6px;
            background: #0f172a;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
            display: block; /* เปิดให้เห็นแถบสถานะตั้งแต่แรก */
            opacity: 0.3;
        }

        .scanner-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.1s linear;
        }

        .btn-start {
            margin-top: 20px;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
            transition: all 0.2s ease;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .btn-start:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .result-panel { justify-content: flex-start; align-items: stretch; }
        .panel-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 600;
        }

        #label-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        
        .prediction-row {
            background: #141e30;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        .prediction-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .class-name { font-weight: 500; color: #e2e8f0; }
        .class-percentage { font-weight: 600; color: var(--primary); }
        .progress-bar-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.4s ease; }

        .prediction-row.highest {
            border-color: rgba(16, 185, 129, 0.5);
            background: linear-gradient(to right, rgba(16, 185, 129, 0.05), rgba(20, 30, 48, 0.5));
        }
        .prediction-row.highest .class-percentage { color: var(--accent); }
        .prediction-row.highest .progress-bar-fill { background: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Teachable Machine Image Analyzer</h1>
            <p>ระบบแยกแยะวัตถุด้วย AI ประมวลผลอัตโนมัติในทุก ๆ 3 วินาที</p>
        </div>

        <!-- กล่องพ่นโค้ด Error แนะนำวิธีแก้ให้ผู้ใช้เห็นทันที -->
        <div class="error-box" id="error-display"></div>

        <div class="workspace">
            <div class="view-panel">
                <div class="panel-title">Live Video Input</div>
                <div class="webcam-wrapper" id="webcam-box">
                    <div class="placeholder-text" id="placeholder">คลิกปุ่มด้านล่างเพื่อเริ่มเปิดระบบสแกนภาพ</div>
                    <div id="webcam-container"></div>
                </div>
                <div class="scanner-timeline" id="timeline-box">
                    <div class="scanner-progress" id="scanner-bar"></div>
                </div>
                <button class="btn-start" type="button" id="btn-init" onclick="init()">
                    Start System
                </button>
            </div>

            <div class="result-panel">
                <div class="panel-title">AI Predictions (Every 3s)</div>
                <div id="label-container">
                    <!-- แสดงผล UI รอไว้ล่วงหน้าเลยเพื่อไม่ให้หน้าจอโล่งค้าง -->
                    <div class="prediction-row">
                        <div class="prediction-info"><span class="class-name">สวมหน้ากากอนามัย (Mask)</span><span class="class-pct" style="color:var(--text-muted)">รอเปิดระบบ..</span></div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
                    </div>
                    <div class="prediction-row">
                        <div class="prediction-info"><span class="class-name">ไม่สวมหน้ากากอนามัย (No Mask)</span><span class="class-pct" style="color:var(--text-muted)">รอเปิดระบบ..</span></div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- โหลด TensorFlow + Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดลหน้ากากอนามัยของคุณ[cite: 2]
        const URL = "https://teachablemachine.withgoogle.com/models/hzU8HLZuK/";[cite: 2]

        let model, webcam, labelContainer;
        let maxPredictions = 2; // ตั้งค่าเริ่มต้นป้องกันสคริปต์หยุดทำงานกลางคัน
        let lastPredictTime = 0;
        const PREDICT_INTERVAL = 3000; 
        let isSystemReady = false;
        let useDemoMode = false;

        // ฟังก์ชันช่วยพ่นข้อความ Error เตือนผู้ใช้บนหน้าจออย่างสวยงาม
        function showUIError(msg) {
            const errBox = document.getElementById("error-display");
            errBox.style.display = "block";
            errBox.innerHTML = `<strong>💡 แนะนำการเปิดสิทธิ์เบราว์เซอร์:</strong><br>${msg}`;
        }

        // สร้างโครงสร้างแถบผลลัพธ์ล่วงหน้าทันทีที่เปิดเว็บ
        window.addEventListener('DOMContentLoaded', () => {
            renderLabels(["สวมหน้ากากอนามัย (Mask)", "ไม่สวมหน้ากากอนามัย (No Mask)"]);
        });

        function renderLabels(classes) {
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            classes.forEach((className, i) => {
                const row = document.createElement("div");
                row.className = "prediction-row";
                row.id = `pred-row-${i}`;
                row.innerHTML = `
                    <div class="prediction-info">
                        <span class="class-name" id="class-name-${i}">${className}</span>
                        <span class="class-percentage" id="class-pct-${i}">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="class-bar-${i}"></div>
                    </div>
                `;
                labelContainer.appendChild(row);
            });
        }

        async function init() {
            const btn = document.getElementById("btn-init");
            btn.disabled = true;
            btn.innerText = "กำลังเชื่อมต่อโมเดล AI...";
            
            document.getElementById("error-display").style.display = "none";
            document.getElementById("timeline-box").style.opacity = "1";

            try {
                // 1. โหลดโมเดลจาก Server[cite: 2]
                model = await tmImage.load(URL + "model.json", URL + "metadata.json").catch(e => {
                    throw new Error("เบราว์เซอร์บล็อกการเข้าถึงไฟล์โมเดลชั่วคราว หรือเครือข่ายอินเทอร์เน็ตไม่เสถียร");
                });
                
                maxPredictions = model.getTotalClasses();[cite: 2]
                renderLabels(model.getClassLabels());

                // 2. พยายามเรียกเปิดกล้องเว็บแคม[cite: 2]
                try {
                    webcam = new tmImage.Webcam(280, 280, true);[cite: 2]
                    await webcam.setup();[cite: 2]
                    await webcam.play();[cite: 2]
                    
                    document.getElementById("webcam-container").innerHTML = "";
                    document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 2]
                    document.getElementById("placeholder").style.display = "none";
                    document.getElementById("webcam-box").classList.add("active");
                } catch (camErr) {
                    console.warn("เปิดกล้องไม่ได้ ระบบเปิดใช้งานโหมดจำลองเพื่อให้เห็นดีไซน์:", camErr);
                    useDemoMode = true;
                    showUIError("ไม่สามารถเปิดกล้องเว็บแคมได้ชั่วคราว <br>👉 <b>วิธีแก้ไข:</b> มองหาไอคอนรูป <b>'แม่กุญแจ'</b> หรือปุ่มตัวเลือกหน้าช่องกรอก URL บนเบราว์เซอร์ของคุณ จากนั้นเปลี่ยนสิทธิ์ตรงคำว่า <b>'กล้อง (Camera)'</b> ให้เป็น <b>'อนุญาต (Allow)'</b> แล้วกดรีเฟรชหน้าเว็บอีกครั้งครับ <br>*(ขณะนี้ระบบรันโหมดจำลองอนิเมชันให้ตรวจเช็คดีไซน์ล่วงหน้า)*");
                    document.getElementById("placeholder").innerHTML = "📸 [โหมดจำลองกราฟิก]<br>เบราว์เซอร์บล็อกการเข้าถึงกล้อง";
                }

                // เปลี่ยนสถานะให้ระบบเริ่มทำลูปจับเวลา
                isSystemReady = true;
                btn.style.display = "none"; // ซ่อนปุ่มเมื่อรันผ่านแล้ว
                lastPredictTime = performance.now();
                window.requestAnimationFrame(loop);
                
                // สั่งประมวลผลรอบแรกทันที
                await predict();

            } catch (error) {
                console.error(error);
                showUIError(error.message + "<br>กรุณาลองรีเฟรชหน้าเว็บ (F5) แล้วกดใหม่อีกครั้ง");
                btn.disabled = false;
                btn.innerText = "ลองใหม่อีกครั้ง (Retry)";
            }
        }

        async function loop() {
            if (!isSystemReady) return;

            // อัปเดตภาพสตรีมสด (ถ้ามีกล้องจริง)[cite: 2]
            if (webcam && webcam.canvas && !useDemoMode) {
                webcam.update();[cite: 2]
            }
            
            const currentTime = performance.now();
            const elapsedTime = currentTime - lastPredictTime;
            
            // อัปเดตแถบโหลดนับถอยหลังวิ่งจาก 0% ไป 100% ภายใน 3 วินาที
            const progressPercent = Math.min((elapsedTime / PREDICT_INTERVAL) * 100, 100);
            document.getElementById("scanner-bar").style.width = `${progressPercent}%`;

            // เมื่อครบทุก ๆ 3 วินาที ให้สั่งทายผล
            if (elapsedTime >= PREDICT_INTERVAL) {
                await predict();[cite: 2]
                lastPredictTime = currentTime; // รีเซ็ตลูปเวลาใหม่
            }

            window.requestAnimationFrame(loop);[cite: 2]
        }

        async function predict() {
            let resultData = [];

            // เคสที่ 1: กล้องและโมเดลพร้อมทำงานจริงร้อยเปอร์เซ็นต์
            if (model && webcam && webcam.canvas && !useDemoMode) {
                resultData = await model.predict(webcam.canvas);[cite: 2]
            } 
            // เคสที่ 2: ระบบเปิดกล้องไม่ได้ ให้สร้างข้อมูลสุ่มอนิเมชันขึ้นมาเพื่อให้กราฟิกทำงานสวยงาม
            else {
                let randomVal = Math.random();
                let labels = model ? model.getClassLabels() : ["Mask", "No Mask"];
                resultData = [
                    { className: labels[0], probability: randomVal },
                    { className: labels[1], probability: 1 - randomVal }
                ];
            }
            
            // ค้นหาคลาสที่คะแนนสูงสุดในรอบนั้น
            let highestIndex = 0;
            let highestVal = 0;
            for(let i = 0; i < resultData.length; i++) {
                if(resultData[i].probability > highestVal) {
                    highestVal = resultData[i].probability;
                    highestIndex = i;
                }
            }

            // นำตัวเลขไปวาดลงแถบความกว้างเปอร์เซ็นต์บนหน้าจอ UI
            for (let i = 0; i < resultData.length; i++) {
                const className = resultData[i].className;
                const probability = resultData[i].probability;
                const percentage = (probability * 100).toFixed(0);

                const nameEl = document.getElementById(`class-name-${i}`);
                const pctEl = document.getElementById(`class-pct-${i}`);
                const barEl = document.getElementById(`class-bar-${i}`);
                const rowEl = document.getElementById(`pred-row-${i}`);

                if (nameEl && pctEl && barEl) {
                    nameEl.innerText = className;
                    pctEl.innerText = `${percentage}%`;
                    barEl.style.width = `${percentage}%`;

                    // ไฮไลท์คลาสสีเขียวสำหรับคลาสที่มีเปอร์เซ็นต์ชนะสูงสุด
                    if (i === highestIndex && probability > 0.05) {
                        rowEl.classList.add("highest");
                    } else {
                        rowEl.classList.remove("highest");
                    }
                }
            }
        }
    </script>
</body>
</html>
